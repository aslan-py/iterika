name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest tests/ -q

      - name: Notify Telegram — success
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ CI пройден — ${{ github.repository }}
          Ветка: ${{ github.ref_name }}
          Коммит: ${{ github.event.head_commit.message }}"

      - name: Notify Telegram — failure
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ CI упал — ${{ github.repository }}
          Ветка: ${{ github.ref_name }}
          Смотри логи: ${{ github.server_url }}/${{ github.repository }}/actions"

  docker-build:
    # Проверяем, что образ собирается. Пайплайн не запускаем — в CI
    # нет секретов (DeepSeek/AmoCRM) и смысла реально парсить WB.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t interica:ci .
